name: Check Server Logs

on:
  workflow_dispatch:

jobs:
  check-logs:
    name: Check Application Logs
    runs-on: ubuntu-latest

    steps:
      - name: Check Logs
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /var/www/first-seller-crm

            echo "=== Recording file exists? ==="
            ls -la public/recordings/MjYxMzI4MzU2ODE__.mp3 2>/dev/null || echo "FILE NOT FOUND"

            echo ""
            echo "=== OPENAI_API_KEY length ==="
            grep "OPENAI_API_KEY" .env | wc -c

            echo ""
            echo "=== Test transcribe ==="
            curl -s -X POST http://localhost:3000/api/calls/cmmdk6dus0399cqvd3jkj5q8r/transcribe
            echo ""
            sleep 45

            echo ""
            echo "=== PM2 out logs (last 40) ==="
            tail -40 ~/.pm2/logs/first-seller-crm-out.log 2>/dev/null || pm2 logs first-seller-crm --lines 40 --nostream 2>/dev/null

            echo ""
            echo "=== PM2 error logs (last 20) ==="
            tail -20 ~/.pm2/logs/first-seller-crm-error.log 2>/dev/null
