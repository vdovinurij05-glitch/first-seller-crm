name: Check Server Logs

on:
  workflow_dispatch:

jobs:
  check-logs:
    name: Check Application Logs
    runs-on: ubuntu-latest

    steps:
      - name: Check Logs and Re-sync
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /var/www/first-seller-crm

            echo "=== Recording files count ==="
            ls public/recordings/*.mp3 2>/dev/null | wc -l

            echo ""
            echo "=== Triggering sync ==="
            curl -s http://localhost:3000/api/mango/sync
            echo ""

            sleep 10

            echo ""
            echo "=== Last 50 PM2 logs ==="
            pm2 logs first-seller-crm --lines 50 --nostream 2>/dev/null
